name: Build Native

on: push
env:
  WINDOWS_ARM_RUNNER: &windows-latest-arm windows-11-arm
  UBUNTU_ARM_RUNNER: &ubuntu-latest-arm ubuntu-26.04-arm
  MACOS_FOR_DOTNET_IOS: &macos-latest-dotnet-ios macos-26
  BUILD_TYPE: Release
  ANDROID_NDK_VER: 28.2.13676358
  ANDROID_PLATFORM_VER: 35

permissions: # For GitHub OIDC
  id-token: write
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: win-x64,       os: windows-latest,   flags: -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded }
          - { name: win-arm64,     os: windows-latest,   flags: -A ARM64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded }
          - { name: linux-x64,     os: ubuntu-latest,     flags: -GNinja }
          - { name: linux-arm64,   os: *ubuntu-latest-arm, flags: -GNinja }
          - { name: osx-arm64,     os: macos-latest,     flags: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 }
          - { name: android-arm64, os: ubuntu-latest,     flags: -GNinja, abi: arm64-v8a }
          - { name: android-x64,   os: ubuntu-latest,     flags: -GNinja, abi: x86_64 }
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup JDK
        if: contains(matrix.platform.name, 'android')
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 21
      - name: Install Android SDK Manager
        if: contains(matrix.platform.name, 'android')
        uses: android-actions/setup-android@v4
      - name: Install Android SDK
        if: contains(matrix.platform.name, 'android')
        run: |
          sdkmanager --install "platforms;android-$ANDROID_PLATFORM_VER"
          sdkmanager --install "ndk;$ANDROID_NDK_VER"

      - name: Build
        shell: bash
        env:
          NAME: ${{ matrix.platform.name }}
          RUNNER_OS: ${{ runner.os }}
          FLAGS: ${{ matrix.platform.flags }}
          ANDROID_ABI: ${{ matrix.platform.abi }}
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          ANDROID_NDK_VER: ${{ env.ANDROID_NDK_VER }}
          ANDROID_PLATFORM_VER: ${{ env.ANDROID_PLATFORM_VER }}
        run: ./build-native.sh

      - name: Compress native directory
        run: tar -cvf native-${{ matrix.platform.name }}.tar native/${{ case(!contains(matrix.platform.name, 'android'), matrix.platform.name, format('android/{0}', matrix.platform.abi)) }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform.name }}
          path: native-${{ matrix.platform.name }}.tar
          archive: false # don't put in zip, just upload the tar file
          if-no-files-found: error

  build-ios:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: ios-arm64,          flags: -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0,                    output: ios,          sdk: iphoneos }
          - { name: iossimulator-arm64, flags: -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphonesimulator -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0, output: iossimulator, sdk: iphonesimulator }
          - { name: maccatalyst-arm64,  flags: -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0, output: maccatalyst,  sdk: maccatalyst }
    name: Build ${{ matrix.platform.name }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build
        run: |
          if [[ "${{ matrix.platform.name }}" == "maccatalyst-arm64" ]]; then
            # Mac Catalyst: use Unix Makefiles with an explicit target triple
            # (arm64-apple-ios15.0-macabi). The Xcode generator always produces
            # iOS binaries regardless of xcodebuild overrides.
            SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
            cmake -S box3d -B build-${{ matrix.platform.name }} \
              -G "Unix Makefiles" \
              -DCMAKE_C_COMPILER=clang \
              -DCMAKE_CXX_COMPILER=clang++ \
              -DCMAKE_OSX_SYSROOT="$SDKROOT" \
              -DCMAKE_OSX_ARCHITECTURES=arm64 \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
              -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
              -DCMAKE_C_FLAGS="-target arm64-apple-ios15.0-macabi" \
              -DCMAKE_CXX_FLAGS="-target arm64-apple-ios15.0-macabi" \
              -DCMAKE_SHARED_LINKER_FLAGS="-target arm64-apple-ios15.0-macabi -Wl,-install_name,@rpath/box3d.framework/box3d" \
              -DCMAKE_EXE_LINKER_FLAGS="-target arm64-apple-ios15.0-macabi" \
              -DBUILD_SHARED_LIBS=ON \
              -DBOX3D_SAMPLES=OFF \
              -DBOX3D_UNIT_TESTS=OFF \
              -DBOX3D_VALIDATE=OFF
            cmake --build build-${{ matrix.platform.name }} --config $BUILD_TYPE
          else
            cmake -S box3d -B build-${{ matrix.platform.name }} \
              ${{ matrix.platform.flags }} \
              -DBUILD_SHARED_LIBS=ON \
              -DBOX3D_SAMPLES=OFF \
              -DBOX3D_UNIT_TESTS=OFF \
              -DBOX3D_VALIDATE=OFF
            cmake --build build-${{ matrix.platform.name }} --config $BUILD_TYPE -- CODE_SIGNING_ALLOWED=NO
          fi

      - name: Create framework
        run: |
          framework_dir="native/${{ matrix.platform.name }}/box3d.framework"
          mkdir -p "$framework_dir"
          if [ -f "build-${{ matrix.platform.name }}/bin/$BUILD_TYPE/libbox3d.dylib" ]; then
            cp "build-${{ matrix.platform.name }}/bin/$BUILD_TYPE/libbox3d.dylib" "$framework_dir/box3d"
          else
            cp "build-${{ matrix.platform.name }}/bin/libbox3d.dylib" "$framework_dir/box3d"
          fi
          cat > "$framework_dir/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>box3d</string>
            <key>CFBundleIdentifier</key>
            <string>org.box2d.Box3D</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>box3d</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
          </dict>
          </plist>
          EOF

      - name: Compress native directory
        run: tar -cvf native-${{ matrix.platform.name }}.tar native/${{ matrix.platform.name }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          path: native-${{ matrix.platform.name }}.tar
          archive: false # don't put in zip, just upload the tar file
          if-no-files-found: error

  pack-nuget:
    name: Pack NuGet package
    runs-on: ubuntu-latest
    needs: [ build, build-ios ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*.tar
          merge-multiple: true

      - name: Decompress native artifacts
        run: |
          for file in native-*.tar
          do
            tar -xf "$file"
          done
          rm native-*.tar

      - name: Set up .NET and Clang
        uses: ./.github/actions/setup-dotnet-clang

      - name: Pack NuGet package
        shell: bash
        run: dotnet pack -c $BUILD_TYPE -o ./artifacts
    
      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ./artifacts
          archive: false # don't put in zip, just upload the nupkg file
          if-no-files-found: error

  validate:
    name: Validate NuGet package on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    needs: pack-nuget
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Host platforms — run as net10.0 console app
          - { name: win-x64,         os: windows-latest,   tfm: net10.0 }
          - { name: win-arm64,       os: *windows-latest-arm,   tfm: net10.0 }
          - { name: linux-x64,       os: ubuntu-latest,    tfm: net10.0 }
          - { name: linux-arm64,     os: *ubuntu-latest-arm, tfm: net10.0 }
          - { name: osx-arm64,       os: macos-latest,     tfm: net10.0 }
          # Mobile platforms — run with mobile workloads
          - { name: android-arm64,   os: ubuntu-latest,    tfm: net10.0-android,    mobile: true }
          - { name: android-x64,     os: ubuntu-latest,    tfm: net10.0-android,    mobile: true }
          - { name: iossimulator-arm64, os: *macos-latest-dotnet-ios,  tfm: net10.0-ios,        mobile: true } # Don't validate iOS as it requires a real device
          - { name: maccatalyst-arm64,  os: *macos-latest-dotnet-ios,  tfm: net10.0-maccatalyst, mobile: true }
    steps:
      - uses: actions/checkout@v7

      # Android SDK (only needed for Android validation)
      - name: Setup JDK
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'android')
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 21
      - name: Install Android SDK Manager
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'android')
        uses: android-actions/setup-android@v4
      - name: Install Android SDK
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'android')
        run: |
          sdkmanager --install "platforms;android-$ANDROID_PLATFORM_VER"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      # Mobile workloads
      - name: Install Android workload
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'android')
        run: dotnet workload install android
      - name: Install iOS workload
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'ios')
        run: dotnet workload install ios
      - name: Install Mac Catalyst workload
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'maccatalyst')
        run: dotnet workload install maccatalyst
      # Apple syncs version numbers across iOS, macOS, and Xcode; the .NET iOS
      # workload version matches: 26.5.10284 → iOS 26.5 → Xcode 26.5.
      # (https://github.com/dotnet/macios/issues/25818#issuecomment-4799784136)
      # We derive Xcode version from the installed iOS workload manifest by
      # scanning all SDK band directories for `microsoft.net.sdk.ios/` and
      # metadata/workloads/InstalledManifests/, then picking the latest version.
      # We query the dotnet binary directly because actions/setup-dotnet may set
      # $DOTNET_ROOT to $HOME/.dotnet while the actual SDK lives elsewhere.
      - name: Get Xcode version from iOS workload
        id: ios-version
        if: matrix.platform.mobile == true && (contains(matrix.platform.name, 'ios') || contains(matrix.platform.name, 'maccatalyst'))
        run: |
          echo "::group::Resolve Xcode version from iOS workload"
          echo "dotnet version: $(dotnet --version)"
          DOTNET_ROOT_REAL=$(command -v dotnet)
          while [ -L "$DOTNET_ROOT_REAL" ]; do
            DOTNET_ROOT_REAL=$(readlink "$DOTNET_ROOT_REAL") # Resolve symlinks by repeatedly calling readlink
          done
          DOTNET_ROOT_REAL=$(dirname "$DOTNET_ROOT_REAL")
          echo "dotnet root: $DOTNET_ROOT_REAL"
          _all_versions=
          for _kind in sdk-manifests metadata/workloads/InstalledManifests; do
            _dir="$DOTNET_ROOT_REAL/$_kind"
            [ -d "$_dir" ] || { echo "  $_kind: not found"; continue; }
            echo "  scanning $_dir ..."
            for _sub in "$_dir"/*/; do
              _ios="$_sub/microsoft.net.sdk.ios"
              [ -d "$_ios" ] || continue
              _versions=$(ls "$_ios/" 2>/dev/null)
              echo "  found: $_ios -> $_versions"
              _all_versions="$_all_versions $_versions"
            done
          done
          IOS_VERSION=$(echo "$_all_versions" | tr ' ' '\n' | grep -v '^$' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1 | cut -d. -f1-2)
          echo "Resolved Xcode version: ${IOS_VERSION:-latest-stable}"
          echo "xcode-version=${IOS_VERSION:-latest-stable}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.platform.mobile == true && (contains(matrix.platform.name, 'ios') || contains(matrix.platform.name, 'maccatalyst'))
        with:
          xcode-version: ${{ steps.ios-version.outputs.xcode-version }}

      - name: Ensure iOS Simulator runtime matches Xcode version
        if: matrix.platform.mobile == true && contains(matrix.platform.name, 'ios')
        shell: bash
        run: |
          XCODE_VER="${{ steps.ios-version.outputs.xcode-version }}"
          if [[ "$XCODE_VER" == "latest-stable" ]]; then
            LATEST=$(xcrun simctl list runtimes 2>/dev/null | grep -E "iOS " | tail -1 | grep -o 'com\.apple\.CoreSimulator\.SimRuntime\.[^ ]*' | head -1)
            echo "Using latest stable runtime: $LATEST"
            exit 0
          fi
          EXPECTED_RUNTIME="com.apple.CoreSimulator.SimRuntime.iOS-$(echo "$XCODE_VER" | tr . -)"
          echo "Expected runtime: $EXPECTED_RUNTIME (Xcode $XCODE_VER)"
          if xcrun simctl list runtimes 2>/dev/null | grep -q "$EXPECTED_RUNTIME"; then
            echo "Runtime already installed."
            exit 0
          fi
          echo "Runtime not found. Downloading..."
          xcodebuild -downloadPlatform iOS 2>&1 || echo "Download failed or not supported"
          if xcrun simctl list runtimes 2>/dev/null | grep -q "$EXPECTED_RUNTIME"; then
            echo "Runtime installed after download."
          else
            echo "Could not get exact runtime."
          fi

      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          pattern: '*.nupkg'
          merge-multiple: true
          path: ./artifacts

      # For Android: start emulator and run validation inside its script parameter
      - name: Enable KVM
        if: contains(matrix.platform.name, 'android')
        run: |
          sudo chown $USER /dev/kvm || echo "KVM not accessible"
      - name: Validate on Android emulator
        if: contains(matrix.platform.name, 'android')
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35 # must at least be 35. see https://github.com/ReactiveCircus/android-emulator-runner/issues/458
          arch: x86_64 # cannot use arm arch here. see the same issue above
          target: google_apis
          profile: pixel_5
          emulator-boot-timeout: 1800 # 30 minutes
          force-avd-creation: false
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: Test # Don't do cd in script as it's executed in a new bash every line
          script: dotnet run -p TargetFrameworks="${{ matrix.platform.tfm }}" -r "${{ matrix.platform.name }}"

      # For all other platforms: run validation directly
      - name: Validate that the NuGet package works
        if: "!contains(matrix.platform.name, 'android')"
        shell: bash
        run: |
          cd Test
          RID_FLAG=""
          if [[ "${{ matrix.platform.name }}" == "iossimulator-arm64" ]]; then
            RID_FLAG="-r iossimulator-arm64"
          elif [[ "${{ matrix.platform.name }}" == "maccatalyst-arm64" ]]; then
            RID_FLAG="-r maccatalyst-arm64"
          fi
          # List available devices for debugging
          echo "--- Available simulator devices ---"
          xcrun simctl list devices 2>&1 || true
          echo "--- End device list ---"
          if [[ "${{ matrix.platform.name }}" == "iossimulator-arm64" ]]; then
            # Debug: dump runtime and device info to see why .NET reads 26.5 as 26.0
            echo "=== Installed runtimes ==="
            xcrun simctl list runtimes 2>&1 || true
            echo "=== Current devices ==="
            xcrun simctl list devices 2>&1 || true
            echo "=== Create device and check ==="
            RUNTIME_ID=$(xcrun simctl list runtimes 2>/dev/null | grep "iOS " | tail -1 | grep -o 'com\.apple\.CoreSimulator\.SimRuntime\.[^ ]*' | head -1)
            echo "Selected runtime: $RUNTIME_ID"
            # Dump simctl --json to see runtime versions
            echo "=== simctl --json (runtimes only) ==="
            xcrun simctl list --json 2>/dev/null | python3 -m json.tool 2>/dev/null | grep -A5 '"version"\|"name"\|"iOS"' | head -30 || xcrun simctl list --json 2>/dev/null | head -100
            DEVICE_UDID=$(xcrun simctl list devices 2>/dev/null | grep "$RUNTIME_ID" | grep -E -o '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' | head -1 || true)
            if [ -z "$DEVICE_UDID" ]; then
              for old in $(xcrun simctl list devices 2>/dev/null | grep -E -o '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'); do
                xcrun simctl delete "$old" 2>/dev/null || true
              done
              DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro"
              DEVICE_UDID=$(xcrun simctl create "Test Device" "$DEVICE_TYPE" "$RUNTIME_ID")
              echo "Created: $DEVICE_UDID"
              # Dump device properties
              echo "=== Device plist ==="
              plutil -p ~/Library/Developer/CoreSimulator/Devices/$DEVICE_UDID/device.plist 2>/dev/null || true
              echo "=== Runtime plist ==="
              echo "Runtime ID: $RUNTIME_ID"
              # Find the runtime's SystemVersion.plist
              find /Applications -path "*/CoreSimulator/Profiles/Runtimes/*.simruntime" -type d -maxdepth 8 2>/dev/null | while read rt; do
                if plutil -p "$rt/Contents/Resources/SystemVersion.plist" 2>/dev/null | grep -q "$RUNTIME_ID"; then
                  echo "Found runtime at: $rt"
                  plutil -p "$rt/Contents/Resources/SystemVersion.plist" 2>/dev/null || true
                fi
              done
              xcrun simctl boot "$DEVICE_UDID" 2>&1 || true
              xcrun simctl bootstatus "$DEVICE_UDID" -t 120 2>&1 || true
            fi
            echo "=== Device status ==="
            xcrun simctl list devices 2>&1 || true
            dotnet run -p TargetFrameworks=${{ matrix.platform.tfm }} $RID_FLAG
          elif [[ "${{ matrix.platform.name }}" == "maccatalyst-arm64" ]]; then
            # dotnet run creates the .app bundle. Ignore the launch error
            # (no GUI session on CI), then find and run the executable directly.
            dotnet run -p TargetFrameworks=${{ matrix.platform.tfm }} $RID_FLAG
            echo "=== Searching for .app bundle ==="
            # Prefer bin/ path over obj/ (codesign staging copy has no executable)
            APP_DIR=$(find /Users -path "*/bin/*/Test.app" -type d -maxdepth 10 2>/dev/null | head -1)
            if [ -z "$APP_DIR" ]; then
              APP_DIR=$(find /Users -name "Test.app" -type d -maxdepth 10 2>/dev/null | head -1)
            fi
            if [ -z "$APP_DIR" ]; then
              APP_DIR=$(find /Users -path "*/dotnet/runfile/*/Test.app" -type d -maxdepth 10 2>/dev/null | head -1)
            fi
            if [ -z "$APP_DIR" ]; then
              APP_DIR=$(find /Users/runner/Library -name "Test.app" -type d -maxdepth 8 2>/dev/null | head -1)
            fi
            echo "APP_DIR=$APP_DIR"
            if [ -n "$APP_DIR" ]; then
              EXEC=$(find "$APP_DIR" -type f -perm +111 -maxdepth 3 | head -1)
              if [ -n "$EXEC" ]; then
                echo "=== Linked libraries ==="
                otool -L "$EXEC" 2>&1 || true
                echo "=== App bundle contents ==="
                find "$APP_DIR" -type f 2>/dev/null | head -20 || true
                echo "=== box3d.framework in NuGet ==="
                find ~/.nuget/packages/box3d -name "box3d.framework" -type d 2>/dev/null | head -3 || echo "Not found in ~/.nuget/packages"
                echo "=== nupkg maccatalyst contents ==="
                NUPKG=$(ls ../artifacts/Box3D.*.nupkg 2>/dev/null | head -1)
                if [ -n "$NUPKG" ]; then
                  unzip -l "$NUPKG" 2>/dev/null | grep "maccatalyst" | head -10
                fi
                echo "=== box3d dylib install name ==="
                NUGET_FW=$(find ~/.nuget/packages/box3d -name "box3d.framework" -type d 2>/dev/null | head -1)
                if [ -n "$NUGET_FW" ]; then
                  otool -L "$NUGET_FW/box3d" 2>&1 || true
                fi
                "$EXEC"
              else
                echo "No executable found in $APP_DIR" >&2
                ls -laR "$APP_DIR" 2>/dev/null | head -20
                exit 1
              fi
            else
              echo "Could not find .app bundle anywhere" >&2
              exit 1
            fi
          else
            dotnet run -p TargetFrameworks=${{ matrix.platform.tfm }} $RID_FLAG
          fi

  nuget-push:
    name: Push to NuGet
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v7
      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          pattern: '*.nupkg'
          merge-multiple: true
          path: ./artifacts
      # Get a short-lived NuGet API key via GitHub OIDC
      - name: NuGet login
        continue-on-error: true
        uses: NuGet/login@v1
        id: login
        with:
          user: Happypig375
      # Push the package
      - name: NuGet push
        continue-on-error: true
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate