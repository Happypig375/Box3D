name: Build

on: push
env:
  WINDOWS_ARM_RUNNER: &windows-latest-arm windows-11-arm
  UBUNTU_ARM_RUNNER: &ubuntu-latest-arm ubuntu-26.04-arm
  MACOS_FOR_DOTNET_IOS: &macos-latest-dotnet-ios macos-26
  BUILD_TYPE: Release
  ANDROID_NDK_VER: 28.2.13676358
  ANDROID_PLATFORM_VER: 35

permissions: # For GitHub OIDC
  id-token: write
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        large-worlds: ['', large-worlds]
        platform:
          - { name: win-x64,       os: windows-latest,   flags: -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded }
          - { name: win-arm64,     os: windows-latest,   flags: -A ARM64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded }
          - { name: linux-x64,     os: ubuntu-latest,     flags: -GNinja }
          - { name: linux-arm64,   os: *ubuntu-latest-arm, flags: -GNinja }
          - { name: osx-arm64,     os: macos-latest,     flags: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 }
          - { name: android-arm64, os: ubuntu-latest,     flags: -GNinja, abi: arm64-v8a }
          - { name: android-x64,   os: ubuntu-latest,     flags: -GNinja, abi: x86_64 }
          - { name: ios-arm64,          os: macos-latest }
          - { name: iossimulator-arm64, os: macos-latest }
          - { name: tvos-arm64,         os: macos-latest }
          - { name: tvossimulator-arm64, os: macos-latest }
          - { name: maccatalyst-arm64,  os: macos-latest }
    name: Build ${{ matrix.large-worlds }} ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build (Release)
        shell: bash
        env:
          NAME: ${{ matrix.platform.name }}
          RUNNER_OS: ${{ runner.os }}
          FLAGS: ${{ matrix.platform.flags }}
          LARGE_WORLDS: ${{ matrix.large-worlds }}
          ANDROID_ABI: ${{ matrix.platform.abi }}
          BUILD_TYPE: Release
          ANDROID_NDK_VER: ${{ env.ANDROID_NDK_VER }}
          ANDROID_PLATFORM_VER: ${{ env.ANDROID_PLATFORM_VER }}
        run: ./build-native.sh

      - name: Build (Debug)
        shell: bash
        env:
          NAME: ${{ matrix.platform.name }}
          RUNNER_OS: ${{ runner.os }}
          FLAGS: ${{ matrix.platform.flags }}
          LARGE_WORLDS: ${{ matrix.large-worlds }}
          ANDROID_ABI: ${{ matrix.platform.abi }}
          BUILD_TYPE: Debug
          BOX3D_VALIDATE: ON # Note that we also enable all validation for Debug
          ANDROID_NDK_VER: ${{ env.ANDROID_NDK_VER }}
          ANDROID_PLATFORM_VER: ${{ env.ANDROID_PLATFORM_VER }}
        run: ./build-native.sh

      - name: Compress native directory
        run: tar -cvf native-${{ matrix.large-worlds }}-${{ matrix.platform.name }}.tar native/${{ matrix.large-worlds && 'large-worlds/' }}${{ case(!contains(matrix.platform.name, 'android'), matrix.platform.name, format('android/{0}', matrix.platform.abi)) }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.large-worlds }}-${{ matrix.platform.name }}
          path: native-${{ matrix.large-worlds }}-${{ matrix.platform.name }}.tar
          archive: false # don't put in zip, just upload the tar file
          if-no-files-found: error

  pack-nuget:
    name: Pack ${{ matrix.large-worlds && 'Box3D.LargeWorlds' || 'Box3D' }} NuGet package
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        large-worlds: ['', large-worlds]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-${{ matrix.large-worlds }}-*.tar
          merge-multiple: true
      - name: Decompress native artifacts
        run: |
          for file in native-${{ matrix.large-worlds }}-*.tar; do
            tar -xf "$file"
          done
          rm native-${{ matrix.large-worlds }}-*.tar
      - name: Set up .NET and Clang
        uses: ./.github/actions/setup-dotnet-clang
      - name: Pack NuGet package
        shell: bash
        run: dotnet pack ${{ matrix.large-worlds && 'Box3D.LargeWorlds/Box3D.LargeWorlds.csproj' }} -c $BUILD_TYPE -o ./artifacts
      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./artifacts
          archive: false # don't put in zip, just upload the nupkg files
          if-no-files-found: error
      - name: Validate XML documentation coverage
        shell: bash
        run: cd Scripts && dotnet run DocCoverage.cs ${{ matrix.large-worlds && '-p DefineConstants=LARGE_WORLDS' }}

  validate:
    name: Validate ${{ matrix.large-worlds && 'Box3D.LargeWorlds' || 'Box3D' }} ${{ matrix.config }} on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    needs: pack-nuget
    strategy:
      fail-fast: false
      matrix:
        large-worlds: ['', large-worlds]
        platform:
          - { name: win-x64,         os: windows-latest,   tfm: net10.0 }
          - { name: win-arm64,       os: *windows-latest-arm,   tfm: net10.0 }
          - { name: linux-x64,       os: ubuntu-latest,    tfm: net10.0 }
          - { name: linux-arm64,     os: *ubuntu-latest-arm, tfm: net10.0 }
          - { name: osx-arm64,       os: macos-latest,     tfm: net10.0 }
          - { name: android-arm64,   os: ubuntu-latest,    tfm: net10.0-android, build-only: true } # Didn't find a way to run this on CI without hanging
          - { name: android-x64,     os: ubuntu-latest,    tfm: net11.0-android }
          - { name: iossimulator-arm64, os: *macos-latest-dotnet-ios,  tfm: net11.0-ios } # Building for ios-arm64 requires a real device so it's omitted
          - { name: tvossimulator-arm64, os: *macos-latest-dotnet-ios,  tfm: net11.0-tvos } # Building for tvos-arm64 requires a real device so it's omitted
          - { name: maccatalyst-arm64,  os: *macos-latest-dotnet-ios,  tfm: net11.0-maccatalyst }
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.x
          dotnet-quality: preview # needed for net11.0
          workloads:
            ${{ contains(matrix.platform.name, 'android') && 'android' ||
                contains(matrix.platform.name, 'ios') && 'ios' ||
                contains(matrix.platform.name, 'tvos') && 'tvos' ||
                contains(matrix.platform.name, 'maccatalyst') && 'maccatalyst' || '' }}
      - name: Export .NET host path
        if: contains(matrix.platform.name, 'android')
        shell: bash
        run: echo "DOTNET_HOST_PATH=$(command -v dotnet)" >> "$GITHUB_ENV"
      - name: Get Xcode version from Apple workload
        id: ios-version
        if: contains(matrix.platform.name, 'ios') || contains(matrix.platform.name, 'tvos') || contains(matrix.platform.name, 'maccatalyst')
        run: |
          # NOTE: .NET for iOS/tvOS/MacCatalyst checks the major.minor version of Xcode for version validation.
          # Meanwhile, the available property for us (_RecommendedXcodeVersion) may include a build number like 26.6.1.
          # We strip any patch component so setup-xcode uses semver range matching (bare "26.6" matches any 26.6.x).
          # If we passed the full 3-component version like "26.6.1", Node.js's semver.satisfies would require
          # an exact patch match, which could fail if the runner only has "26.6.0" (or vice versa).
          # This property is more reliable than trying to derive the Xcode version from the workload version number, since the mapping is
          # not always 1:1 (e.g. iOS 26.5 → Xcode 26.6), see https://github.com/dotnet/macios/issues/25818
          XCODE_VERSION=$(dotnet build -getProperty:_RecommendedXcodeVersion -f ${{ matrix.platform.tfm }} 2>/dev/null)
          echo "Recommended Xcode version for ${{ matrix.platform.tfm }} is $XCODE_VERSION"
          XCODE_VERSION=$(echo "$XCODE_VERSION" | cut -d. -f1-2) # Keep only major.minor
          echo "xcode-version=${XCODE_VERSION:-latest-stable}" >> "$GITHUB_OUTPUT"
      - uses: maxim-lobanov/setup-xcode@v1
        if: contains(matrix.platform.name, 'ios') || contains(matrix.platform.name, 'tvos') || contains(matrix.platform.name, 'maccatalyst')
        with:
          xcode-version: ${{ steps.ios-version.outputs.xcode-version }}

      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          pattern: Box3D*.nupkg
          merge-multiple: true
          path: ./artifacts

      - name: Validate build
        if: matrix.platform.build-only
        run: cd Test && dotnet build -c ${{ matrix.config }} -p TargetFrameworks=${{ matrix.platform.tfm }} -r ${{ matrix.platform.name }} ${{ matrix.large-worlds && '-p:LargeWorlds=true' }}

      # For Android: start emulator and run validation inside its script parameter
      - name: Enable KVM # Speeds up emulator startup time from 15 minutes to 2.5 minutes
        if: "!matrix.platform.build-only && contains(matrix.platform.name, 'android')"
        run: sudo chown $USER /dev/kvm || echo "KVM not accessible"
      - name: Validate on Android emulator
        if: "!matrix.platform.build-only && contains(matrix.platform.name, 'android')"
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35 # must at least be 35. see https://github.com/ReactiveCircus/android-emulator-runner/issues/458
          arch: x86_64 # must be x86_64. see above issue
          target: google_apis
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-load -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: Test # Don't do cd in script as it's executed in a new bash every line
          script: dotnet run -c ${{ matrix.config }} -p TargetFrameworks="${{ matrix.platform.tfm }}" -r "${{ matrix.platform.name }}" ${{ matrix.large-worlds && '-p:LargeWorlds=true' }}

      # For all other platforms: run validation directly
      - name: Validate that the NuGet package works
        if: "!matrix.platform.build-only && !contains(matrix.platform.name, 'android')"
        shell: bash
        run: |
          cd Test
          if [ -n "$MD_APPLE_SDK_ROOT" ]; then
            # maxim-lobanov/setup-xcode@v1 sets the deprecated MD_APPLE_SDK_ROOT environment variable,
            # but .NET for iOS uses DEVELOPER_DIR instead. see https://github.com/maxim-lobanov/setup-xcode/pull/63
            export DEVELOPER_DIR="$MD_APPLE_SDK_ROOT/Contents/Developer"
          fi
          if [[ "${{ matrix.platform.name }}" == *simulator-arm64 ]]; then
            PLATFORM="${{ matrix.platform.name }}"
            SIM_OS="${PLATFORM%simulator-arm64}" # "ios" or "tvos"
            SIM_OS="${SIM_OS%os}OS"              # "iOS" or "tvOS"
            echo "=== Using simulator OS: $SIM_OS ==="
            # Find the highest available iOS/tvOS runtime instead of using the Xcode version
            # (iOS SDK version may lag behind Xcode version, e.g. Xcode 26.6 has iOS 26.5)
            SIM_RUNTIME=$(xcrun simctl list devices | awk -v os="$SIM_OS" '/^-- /{if ($2 == os && $3 > max) max = $3} END{print max}')
            echo "=== Using $SIM_OS $SIM_RUNTIME ==="
            UDID=$(xcrun simctl list devices | awk "/^-- $SIM_OS $SIM_RUNTIME --/{flag=1;next}/^--/{flag=0}flag" | grep -m1 -oE '[0-9A-F-]{36}')
            echo "=== Using simulator UDID: $UDID ==="
            
            # Replace the rest of this if with this line once .NET 11 releases
            # dotnet run -p TargetFrameworks=${{ matrix.platform.tfm }} --device $UDID ${{ matrix.large-worlds && '-p:LargeWorlds=true' }}

            # Boot simulator if not already booted
            xcrun simctl boot "$UDID" 2>/dev/null || true
            xcrun simctl bootstatus "$UDID"
            # Build the app (dotnet run --device requires mlaunch which is missing from .NET 11 preview workload packs)
            dotnet build -c ${{ matrix.config }} -p TargetFrameworks=${{ matrix.platform.tfm }} -r ${{ matrix.platform.name }} ${{ matrix.large-worlds && '-p:LargeWorlds=true' }} \
                -p SupportedOSPlatformVersion=${{ contains(matrix.platform.name, 'ios') && '26.0' || '16.1' }} # work around https://github.com/dotnet/macios/pull/25975 until it's released
            APP_DIR="$PWD/bin/${{ matrix.config }}/${{ matrix.platform.tfm }}/${{ matrix.platform.name }}/Test.app"
            echo "APP_DIR=$APP_DIR"
            if [ -d "$APP_DIR" ]; then
              xcrun simctl install "$UDID" "$APP_DIR"
              echo "=== Launching app on simulator (60s timeout) ==="
              SIM_LOG=$(mktemp)
              xcrun simctl launch --console "$UDID" com.github.Happypig375.Box3D > "$SIM_LOG" 2>&1 &
              SIM_PID=$!
              TEST_PASSED=false
              for i in $(seq 1 60); do
                if grep -q "Test succeeded." "$SIM_LOG" 2>/dev/null; then
                  echo "=== Test succeeded marker found ==="
                  TEST_PASSED=true
                  break
                fi
                if ! kill -0 "$SIM_PID" 2>/dev/null; then
                  echo "=== Simulator console process exited before success ==="
                  break
                fi
                sleep 1
              done

              # Release simctl's console attachment after either success or timeout.
              xcrun simctl terminate "$UDID" com.github.Happypig375.Box3D 2>/dev/null || true
              kill "$SIM_PID" 2>/dev/null || true
              wait "$SIM_PID" 2>/dev/null || true
              cat "$SIM_LOG"

              if grep -q "Test succeeded." "$SIM_LOG" 2>/dev/null; then
                TEST_PASSED=true
              fi
              if grep -qE "Unhandled exception|DllNotFoundException|Box3D.targets failed" "$SIM_LOG" 2>/dev/null; then
                echo "=== Detected failure in simulator output ===" >&2
                TEST_PASSED=false
              fi
              rm -f "$SIM_LOG"
              if [ "$TEST_PASSED" != true ]; then
                echo "Simulator validation did not observe a successful test completion" >&2
                exit 1
              fi
              echo "=== Simulator validation PASSED ==="
            else
              echo "Could not find .app bundle for $SIM_OS simulator" >&2
              exit 1
            fi
          elif [[ "${{ matrix.platform.name }}" == "maccatalyst-arm64" ]]; then
            dotnet build -c ${{ matrix.config }} -p TargetFrameworks=${{ matrix.platform.tfm }} -r ${{ matrix.platform.name }} ${{ matrix.large-worlds && '-p:LargeWorlds=true' }}
            APP_DIR="$PWD/bin/${{ matrix.config }}/${{ matrix.platform.tfm }}/${{ matrix.platform.name }}/Test.app"
            echo "APP_DIR=$APP_DIR"
            if [ -d "$APP_DIR" ]; then
              EXEC="$APP_DIR/Contents/MacOS/Test"
              if [ -x "$EXEC" ]; then
                "$EXEC"
              else
                echo "No executable found in $APP_DIR" >&2
                exit 1
              fi
            else
              echo "Could not find .app bundle anywhere" >&2
              exit 1
            fi
          else
            dotnet run -c ${{ matrix.config }} -p TargetFrameworks=${{ matrix.platform.tfm }} ${{ matrix.large-worlds && '-p:LargeWorlds=true' }}
          fi

  nuget-push:
    name: Push to NuGet
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v7
      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          pattern: '*.nupkg'
          merge-multiple: true
          path: ./artifacts
      - name: NuGet login # Get a short-lived NuGet API key via GitHub OIDC
        continue-on-error: true
        uses: NuGet/login@v1
        id: login
        with:
          user: Happypig375
      - name: NuGet push
        continue-on-error: true
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
