name: Build Native

on: push
env:
  BUILD_TYPE: Release
  ANDROID_NDK_VER: 28.2.13676358
  ANDROID_PLATFORM_VER: 35

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: win-x64,       os: windows-latest,   flags: -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded }
          - { name: win-arm64,     os: windows-latest,   flags: -A ARM64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded }
          - { name: linux-x64,     os: ubuntu-latest,     flags: -GNinja }
          - { name: linux-arm64,   os: ubuntu-22.04-arm, flags: -GNinja }
          - { name: osx-arm64,     os: macos-latest,     flags: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 }
          - { name: android-arm64, os: ubuntu-latest,     flags: -GNinja, abi: arm64-v8a }
          - { name: android-x64,   os: ubuntu-latest,     flags: -GNinja, abi: x86_64 }
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup JDK
        if: contains(matrix.platform.name, 'android')
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 21
      - name: Install Android SDK Manager
        if: contains(matrix.platform.name, 'android')
        uses: android-actions/setup-android@v4
      - name: Install Android SDK
        if: contains(matrix.platform.name, 'android')
        run: |
          sdkmanager --install "platforms;android-$ANDROID_PLATFORM_VER"
          sdkmanager --install "ndk;$ANDROID_NDK_VER"

      - name: Build
        shell: bash
        env:
          NAME: ${{ matrix.platform.name }}
          RUNNER_OS: ${{ runner.os }}
          FLAGS: ${{ matrix.platform.flags }}
          ANDROID_ABI: ${{ matrix.platform.abi }}
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
          ANDROID_NDK_VER: ${{ env.ANDROID_NDK_VER }}
          ANDROID_PLATFORM_VER: ${{ env.ANDROID_PLATFORM_VER }}
        run: ./build-native.sh

      - name: Compress native directory
        run: tar -cvf native-${{ matrix.platform.name }}.tar native/${{ case(!contains(matrix.platform.name, 'android'), matrix.platform.name, format('android/{0}', matrix.platform.abi)) }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform.name }}
          path: native-${{ matrix.platform.name }}.tar
          archive: false # don't put in zip, just upload the tar file
          if-no-files-found: error

  build-ios:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: ios-arm64,          flags: -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0,                    output: ios,          sdk: iphoneos }
          - { name: iossimulator-arm64, flags: -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphonesimulator -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0, output: iossimulator, sdk: iphonesimulator }
          - { name: maccatalyst-arm64,  flags: -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos -DCMAKE_XCODE_ATTRIBUTE_SUPPORTS_MACCATALYST=YES -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0, output: maccatalyst,  sdk: iphoneos }
    name: ${{ matrix.platform.name }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build
        run: |
          cmake -S box3d -B build-${{ matrix.platform.name }} \
            ${{ matrix.platform.flags }} \
            -DBUILD_SHARED_LIBS=ON \
            -DBOX3D_SAMPLES=OFF \
            -DBOX3D_UNIT_TESTS=OFF \
            -DBOX3D_VALIDATE=OFF

          cmake --build build-${{ matrix.platform.name }} --config $BUILD_TYPE -- CODE_SIGNING_ALLOWED=NO

      - name: Create framework
        run: |
          framework_dir="native/${{ matrix.platform.name }}/box3d.framework"
          mkdir -p "$framework_dir"
          cp "build-${{ matrix.platform.name }}/bin/$BUILD_TYPE/libbox3d.dylib" "$framework_dir/box3d"
          cat > "$framework_dir/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>box3d</string>
            <key>CFBundleIdentifier</key>
            <string>org.box2d.Box3D</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>box3d</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
          </dict>
          </plist>
          EOF

      - name: Compress native directory
        run: tar -cvf native-${{ matrix.platform.name }}.tar native/${{ matrix.platform.name }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform.name }}
          path: native-${{ matrix.platform.name }}.tar
          archive: false # don't put in zip, just upload the tar file
          if-no-files-found: error

  publish-nuget:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    needs: [ build, build-ios ]
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          merge-multiple: true

      - name: Decompress native artifacts
        run: |
          for file in native-*.tar
          do
            tar -xf "$file"
          done
          rm native-*.tar

      - name: Install clang resource directory (headers only, not the runtime library)
        run: |
          # The NuGet's libclang.so lacks its resource directory (compiler built-in
          # headers like <stdbool.h>, <stdint.h>). Install just the headers from the
          # common package, which does NOT include a conflicting libclang.so.
          sudo apt-get update && sudo apt-get install -y libclang-common-20-dev
          # Find the installed resource directory for use in the build
          resource_dir=$(find /usr/lib/llvm-*/lib/clang -name 'include' -type d 2>/dev/null | head -1)
          if [ -n "$resource_dir" ]; then
            echo "CLANG_RESOURCE_DIR=$(dirname "$resource_dir")" >> $GITHUB_ENV
          fi

      - name: Make libClang available for P/Invoke generator (workaround)
        run: |
          # ClangSharpPInvokeGenerator needs native libclang.so at runtime.
          # The RID package bundles it alongside the executable but it's unused -
          # see https://github.com/dotnet/ClangSharp/pull/700. Workaround: set LD_LIBRARY_PATH
          # to the NuGet cache directory containing libclang.so. This step may be removed
          # in a future release of ClangSharpPInvokeGenerator.
          dotnet tool restore
          libclang_path=$(find ~/.nuget/packages/clangsharppinvokegenerator.linux-x64 -name 'libclang.so' | head -1)
          if [ -n "$libclang_path" ]; then
            libdir=$(dirname "$libclang_path")
            echo "LD_LIBRARY_PATH=$libdir" >> $GITHUB_ENV
          fi

      - name: Pack NuGet package
        run: dotnet pack -c $BUILD_TYPE -o ./artifacts
    
      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ./artifacts
          archive: false # don't put in zip, just upload the nupkg file
          if-no-files-found: error

      - name: Publish NuGet package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        if: env.NUGET_API_KEY != '' && startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate