name: Update Submodule

on:
  schedule:
    - cron: 0 6 * * * # Daily at 06:00 UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    if: ${{ vars.APP_CLIENT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      # By default, the GITHUB_TOKEN provided to workflows cannot trigger other workflows on push events.
      # To work around this, we use a GitHub App token instead of the default GITHUB_TOKEN to push changes.
      # This allows us to trigger other workflows on push events.
      # See https://github.com/orgs/community/discussions/55906
      - name: Obtain a new GitHub App installation token to trigger workflows on push
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          # Make sure the value of GITHUB_TOKEN will not be persisted in repo's config
          persist-credentials: false

      - name: Update box3d submodule to latest upstream commit
        run: git submodule update --remote box3d

      - name: Check if submodule changed
        id: check
        run: |
          if git diff --exit-code box3d; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "commit=$(cd box3d && git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "msg<<Mf2xQ8kLp3ZvR7wY" >> "$GITHUB_OUTPUT"
            (cd box3d && git log -1 --pretty=%B) >> "$GITHUB_OUTPUT"
            echo "Mf2xQ8kLp3ZvR7wY" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up .NET and Clang
        if: steps.check.outputs.changed == 'true'
        uses: ./.github/actions/setup-dotnet-clang

      - name: Verify that project builds after submodule update
        if: steps.check.outputs.changed == 'true'
        run: dotnet build

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add box3d
          cat > /tmp/commit_msg <<'Mf2xQ8kLp3ZvR7wY'
          Update box3d to https://github.com/erincatto/box3d/commit/${{ steps.check.outputs.commit }}

          ## ${{ steps.check.outputs.msg }}
          Mf2xQ8kLp3ZvR7wY
          git commit -F /tmp/commit_msg
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
          git push